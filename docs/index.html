<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MD Viewer | Choose language</title>
    <meta
      name="description"
      content="Choose a language for the MD Viewer release page."
    />
    <meta name="theme-color" content="#f7fafb" />
    <link rel="canonical" href="https://espitman.github.io/mdViewer/" />
    <link rel="alternate" hreflang="fa" href="https://espitman.github.io/mdViewer/fa/" />
    <link rel="alternate" hreflang="en" href="https://espitman.github.io/mdViewer/en/" />
    <link rel="alternate" hreflang="x-default" href="https://espitman.github.io/mdViewer/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <script>
      const language = navigator.language || "";
      const target = language.toLowerCase().startsWith("fa") ? "./fa/" : "./en/";
      window.location.replace(target);
    </script>
    <style>
      :root {
        --bg: #f7fafb;
        --ink: #111827;
        --muted: #667085;
        --line: #dbe5e8;
        --accent: #088492;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(8, 132, 146, 0.06) 1px, transparent 1px),
          linear-gradient(180deg, rgba(8, 132, 146, 0.05) 1px, transparent 1px),
          var(--bg);
        background-size: 42px 42px;
      }

      main {
        width: min(520px, 100%);
        padding: 34px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 24px 60px rgba(17, 24, 39, 0.1);
        text-align: center;
      }

      img {
        width: 56px;
        height: 56px;
        border-radius: 14px;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 2rem;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-weight: 700;
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 24px;
        flex-wrap: wrap;
      }

      a {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border-radius: 12px;
        border: 1px solid var(--line);
        color: var(--ink);
        background: white;
        text-decoration: none;
        font-weight: 900;
      }

      a.primary {
        background: var(--ink);
        border-color: var(--ink);
        color: white;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="./assets/icon.png" alt="MD Viewer icon" />
      <h1>MD Viewer</h1>
      <p>Choose your language. در حال انتخاب زبان صفحه.</p>
      <div class="actions">
        <a class="primary" href="./en/">English</a>
        <a href="./fa/" lang="fa" dir="rtl">فارسی</a>
      </div>
    </main>
  </body>
</html>
