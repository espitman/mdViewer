name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Make packaging script executable
        run: chmod +x ./package-dmg.sh

      - name: Build release artifact
        env:
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '1' }}
        run: |
          VERSION="${RELEASE_VERSION#v}"
          ./package-dmg.sh "$VERSION"

      - name: Generate checksum
        run: |
          cd dist
          shasum -a 256 *.dmg > SHA256SUMS.txt

      - name: Create or update GitHub Release
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/*.dmg dist/SHA256SUMS.txt --clobber
          else
            gh release create "$TAG_NAME" dist/*.dmg dist/SHA256SUMS.txt --title "$TAG_NAME" --generate-notes
          fi
